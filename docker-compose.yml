services:
  activemq:
    image: rmohr/activemq:latest
    profiles: ["master"]
    ports:
      - "61616:61616"
      - "8161:8161"
    networks:
      - cluster_net
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: stage3-nginx
    profiles: ["master"]
    ports:
      - "80:80"
    # The official nginx image automatically runs envsubst on files in /etc/nginx/templates/
    # and writes the result to /etc/nginx/conf.d/. Set PC1_IP … PC6_IP in your .env file.
    # For a static config (hardcoded IPs), swap the volumes block to mount nginx.conf directly.
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      - PC1_IP=${PC1_IP:?PC1_IP must be set in .env}
      - PC2_IP=${PC2_IP:?PC2_IP must be set in .env}
      - PC3_IP=${PC3_IP:?PC3_IP must be set in .env}
      # For a 3-node cluster, set PC4_IP=PC1_IP, PC5_IP=PC2_IP, PC6_IP=PC3_IP in your .env file.
      # nginx deduplicates identical upstream servers automatically.
      - PC4_IP=${PC4_IP:?PC4_IP must be set in .env (use same value as PC1_IP for a 3-node cluster)}
      - PC5_IP=${PC5_IP:?PC5_IP must be set in .env (use same value as PC2_IP for a 3-node cluster)}
      - PC6_IP=${PC6_IP:?PC6_IP must be set in .env (use same value as PC3_IP for a 3-node cluster)}
    networks:
      - cluster_net
    restart: unless-stopped

  crawler:
    build:
      context: .
      dockerfile: ingestion-service/Dockerfile
    profiles: ["node"]
    ports:
      - "8080:8080"
    environment:
      - server.port=8080
      - BROKER_URL=tcp://${MASTER_NODE_IP:?MASTER_NODE_IP must be set}:61616
      - MASTER_NODE_IP=${MASTER_NODE_IP:?MASTER_NODE_IP must be set}
      - CURRENT_NODE_IP=${CURRENT_NODE_IP:?CURRENT_NODE_IP must be set — use this machine LAN IP}
      - CLUSTER_NODES_LIST=${CLUSTER_NODES_LIST:?CLUSTER_NODES_LIST must be set}
      - DATA_VOLUME_PATH=/datalake
      - ingestion.async.enabled=${INGESTION_ASYNC_ENABLED:-true}
      - ingestion.async.workers=${INGESTION_ASYNC_WORKERS:-4}
      - datalake.replication.enabled=${DATALAKE_REPLICATION_ENABLED:-true}
      - datalake.replication.port=8080
      - datalake.replication.endpoint=/api/datalake/store
    volumes:
      - ${HOST_DATA_VOLUME_PATH:-./datalake}:/datalake
    networks:
      - cluster_net
    restart: unless-stopped

  indexer:
    build:
      context: .
      dockerfile: indexing-service/Dockerfile
    profiles: ["node"]
    ports:
      - "8081:8081"
      - "5701:5701"
    environment:
      - server.port=8081
      # Hardcoded cluster name — must be identical on every node to prevent split-brain.
      - hazelcast.cluster.name=search-cluster
      - hazelcast.port=5701
      - INDEXER_CONSUMERS=${INDEXER_CONSUMERS:-2}
      - INDEXER_MAX_DELIVERIES=${INDEXER_MAX_DELIVERIES:-5}
      - BROKER_URL=tcp://${MASTER_NODE_IP:?MASTER_NODE_IP must be set}:61616
      - MASTER_NODE_IP=${MASTER_NODE_IP:?MASTER_NODE_IP must be set}
      - CURRENT_NODE_IP=${CURRENT_NODE_IP:?CURRENT_NODE_IP must be set — use this machine LAN IP}
      - CLUSTER_NODES_LIST=${CLUSTER_NODES_LIST:?CLUSTER_NODES_LIST must be set}
      - DATA_VOLUME_PATH=/datalake
    volumes:
      - ${HOST_DATA_VOLUME_PATH:-./datalake}:/datalake
    networks:
      - cluster_net
    restart: unless-stopped

  search:
    build:
      context: .
      dockerfile: search-service/Dockerfile
    profiles: ["node"]
    ports:
      - "8082:8082"
      - "5702:5702"
    environment:
      - server.port=8082
      # Hardcoded cluster name — must be identical on every node to prevent split-brain.
      - hazelcast.cluster.name=search-cluster
      - hazelcast.port=5702
      - CURRENT_NODE_IP=${CURRENT_NODE_IP:?CURRENT_NODE_IP must be set — use this machine LAN IP}
      - CLUSTER_NODES_LIST=${CLUSTER_NODES_LIST:?CLUSTER_NODES_LIST must be set}
    networks:
      - cluster_net
    restart: unless-stopped

networks:
  cluster_net:
    driver: bridge
