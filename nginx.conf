events {}

http {
    upstream search_cluster {
        # least_conn routes each new request to the node with fewest active connections.
        least_conn;

        # Replace these with the actual LAN IPs of every machine running the search service.
        # For a dynamic lab setup use nginx.conf.template + envsubst instead (see CLUSTER_DEPLOYMENT.md).
        server 10.26.14.200:8082 max_fails=3 fail_timeout=15s;
        server 10.26.14.201:8082 max_fails=3 fail_timeout=15s;
        server 10.26.14.202:8082 max_fails=3 fail_timeout=15s;
    }

    server {
        listen 80;

        location = / {
            default_type text/plain;
            add_header X-Upstream-Addr $upstream_addr always;
            return 200 "Stage 3 is running. Use /search?q=<term>&limit=N (or /stats, /books, /health).\n";
        }

        location / {
            proxy_pass http://search_cluster;

            add_header X-Upstream-Addr $upstream_addr always;

            proxy_set_header Host $host;
            proxy_se
            proxy_set_header Host $host;t_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}