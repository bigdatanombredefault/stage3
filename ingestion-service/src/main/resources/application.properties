# Server Configuration
server.port=7001

# Lab / physical cluster identity — MUST be set via environment variables.
# Leaving these blank causes a fast startup failure with a clear error message,
# which is much better than silently running in a broken single-node mode.
# Set them in your .env file or export them before running docker compose.
#   CURRENT_NODE_IP  = this machine's LAN IP (e.g. 192.168.1.10)
#   MASTER_NODE_IP   = the machine running ActiveMQ (e.g. 192.168.1.10)
#   CLUSTER_NODES_LIST = all cluster IPs comma-separated (e.g. 192.168.1.10,192.168.1.11)
CURRENT_NODE_IP=
CLUSTER_NODES_LIST=
MASTER_NODE_IP=

# Datalake Replication (R=2)
# When enabled, the crawler replicates each downloaded book to exactly one other node via HTTP.
datalake.replication.enabled=false
datalake.replication.port=8080
datalake.replication.endpoint=/api/datalake/store
datalake.replication.timeout.ms=5000

# Async ingestion (recommended for load tests)
# When enabled, POST /ingest/{book_id} can return 202 quickly (use ?async=true) while download/replication/index-event
# happens in a background thread.
ingestion.async.enabled=false
ingestion.async.workers=4

# ActiveMQ Configuration
activemq.broker.url=tcp://localhost:61616
activemq.queue.name=document.ingested

# Datalake Strategy Configuration
# Options: bucket, timestamp
datalake.type=bucket
datalake.path=../datalake
datalake.bucket.size=10

# Datalake Tracking
datalake.tracking.filename=downloaded_books.txt

# Book Source Configuration
book.source=gutenberg
gutenberg.base.url=https://www.gutenberg.org/cache/epub
gutenberg.download.timeout=30000

# Logging
log.level=INFO